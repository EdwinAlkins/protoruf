site_name: protoruf
site_description: High-performance Python library for JSON ↔ Protobuf conversion, written in Rust
site_author: protoruf contributors
site_url: https://EdwinAlkins.github.io/protoruf/

# Repository
repo_name: EdwinAlkins/protoruf
repo_url: https://github.com/EdwinAlkins/protoruf
edit_uri: edit/main/docs/

# Copyright
copyright: Copyright &copy; 2024 protoruf contributors

# Theme
theme:
  name: material
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github
  logo: material/format-align-left
  favicon: material/favicon
  language: en

# Customization
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/EdwinAlkins/protoruf
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/protoruf/
  version:
    provider: mike

# Extensions
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      title: On this page
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true

# Plugins
plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            show_category_heading: true
            members_order: source
            group_by_category: true

# Navigation
nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quick-start.md
  - User Guide:
      - Basic Usage: guide/basic-usage.md
      - Proto Files & Compilation: guide/proto-files.md
      - Advanced Features: guide/advanced.md
  - API Reference: api/reference.md
  - Development:
      - Contributing: development/contributing.md
