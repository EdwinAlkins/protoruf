<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>protoruf — WASM browser example</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 720px; }
      h1 { font-size: 1.4rem; }
      pre { background: #f4f4f4; padding: 1rem; border-radius: 6px; white-space: pre-wrap; }
      code { background: #eee; padding: 0 .25rem; border-radius: 3px; }
    </style>
  </head>
  <body>
    <h1>protoruf — WASM in the browser</h1>
    <p>
      JSON ↔ Protobuf with the schema compiled <strong>entirely in the browser</strong>
      (no server round-trip, no filesystem). Output below and in the console.
    </p>
    <pre id="out">loading…</pre>

    <script type="module">
      // Build first (from the repo root):
      //   wasm-pack build --target web --out-dir dist/wasm-web -- --features wasm
      // Then serve over HTTP (ES modules + wasm fetch don't work from file://):
      //   npx serve .          # from the repo root
      //   open http://localhost:3000/examples/js/browser-example.html
      import init, {
        compileProtoFromSources,
        jsonToProtobuf,
        protobufToJson,
        DescriptorCache,
      } from "../../dist/wasm-web/protoruf.js";

      const out = document.getElementById("out");
      const log = (...parts) => {
        out.textContent += parts.join(" ") + "\n";
        console.log(...parts);
      };

      const PROTO = `
        syntax = "proto3";
        package shop;
        enum Status { PENDING = 0; PAID = 1; SHIPPED = 2; }
        message Item { string sku = 1; int32 qty = 2; }
        message Order {
          string id = 1;
          Status status = 2;
          repeated Item items = 3;
          map<string, string> labels = 4;
        }
      `;

      async function main() {
        out.textContent = "";
        await init(); // fetch + instantiate the .wasm module

        // compileProto(path) is NOT available in WASM — compile from sources.
        const descriptor = compileProtoFromSources({ "shop.proto": PROTO }, "shop.proto");
        log("descriptor bytes:", descriptor.length);

        const order = {
          id: "A-1001",
          status: 1, // PAID
          items: [{ sku: "BOOK-42", qty: 2 }],
          labels: { gift: "yes" },
        };
        const wire = jsonToProtobuf(JSON.stringify(order), descriptor, "shop.Order");
        log("protobuf wire size:", wire.length, "bytes");

        log("round-trip:\n" + protobufToJson(wire, descriptor, true, "shop.Order"));

        // WASM objects own linear-memory state: free it when done.
        const cache = new DescriptorCache(descriptor);
        const pb = cache.jsonToProtobuf(JSON.stringify({ id: "A-007" }), "shop.Order");
        log("cached:", cache.protobufToJson(pb, "shop.Order", false));
        cache.free();

        log("\n✔ browser example done");
      }

      main().catch((e) => log("ERROR:", e.message));
    </script>
  </body>
</html>
