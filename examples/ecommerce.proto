syntax = "proto3";

package ecommerce;

// Order represents a customer order
message Order {
    string order_id = 1;
    string customer_id = 2;
    OrderStatus status = 3;
    repeated OrderItem items = 4;
    Address shipping_address = 5;
    PaymentInfo payment = 6;
    int64 created_at = 7;
    int64 updated_at = 8;
}

// Order status enum
enum OrderStatus {
    STATUS_UNSPECIFIED = 0;
    STATUS_PENDING = 1;
    STATUS_CONFIRMED = 2;
    STATUS_PROCESSING = 3;
    STATUS_SHIPPED = 4;
    STATUS_DELIVERED = 5;
    STATUS_CANCELLED = 6;
    STATUS_REFUNDED = 7;
}

// Individual item in an order
message OrderItem {
    string product_id = 1;
    string product_name = 2;
    int32 quantity = 3;
    int64 unit_price = 4;  // Price in cents
    map<string, string> attributes = 5;  // e.g., size, color
}

// Shipping address
message Address {
    string street = 1;
    string city = 2;
    string state = 3;
    string postal_code = 4;
    string country = 5;
    string phone = 6;
}

// Payment information
message PaymentInfo {
    PaymentMethod method = 1;
    string transaction_id = 2;
    int64 amount = 3;  // Amount in cents
    PaymentStatus status = 4;
}

// Payment method
enum PaymentMethod {
    PAYMENT_UNSPECIFIED = 0;
    PAYMENT_CREDIT_CARD = 1;
    PAYMENT_DEBIT_CARD = 2;
    PAYMENT_PAYPAL = 3;
    PAYMENT_BANK_TRANSFER = 4;
    PAYMENT_CRYPTO = 5;
}

// Payment status
enum PaymentStatus {
    PAYMENT_STATUS_UNSPECIFIED = 0;
    PAYMENT_STATUS_PENDING = 1;
    PAYMENT_STATUS_COMPLETED = 2;
    PAYMENT_STATUS_FAILED = 3;
    PAYMENT_STATUS_REFUNDED = 4;
}

// Inventory item
message InventoryItem {
    string sku = 1;
    string product_id = 2;
    int32 quantity_available = 3;
    int32 quantity_reserved = 4;
    string warehouse_id = 5;
    int64 last_updated = 6;
}

// Request to update inventory
message UpdateInventoryRequest {
    string sku = 1;
    int32 quantity_change = 2;  // Positive or negative
    string reason = 3;
}

// Inventory update response
message UpdateInventoryResponse {
    bool success = 1;
    InventoryItem item = 2;
    string message = 3;
}
