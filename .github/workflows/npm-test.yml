name: Node tests

# Build the native napi addon + the WebAssembly package, then run the vitest
# suite (covers the node addon, the wasm build, and node/wasm parity).
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: vitest (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
      - name: Install dependencies
        run: npm ci
      # `pretest:js` builds both the native addon (napi) and the WASM package
      # before vitest runs, so this single step covers the full build + test.
      - name: Run tests
        run: npm run test:js
